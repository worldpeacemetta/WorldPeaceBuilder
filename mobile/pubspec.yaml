name: macrotracker_mobile
description: MacroTracker – dedicated smartphone edition
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  http: ^1.2.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.2.3
  flutter_svg: ^2.0.0
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lottie/
